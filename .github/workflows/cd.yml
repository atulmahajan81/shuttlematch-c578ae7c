name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker images
      run: |
        docker build -f docker/Dockerfile -t ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-api:latest .
        docker build -f docker/Dockerfile.frontend -t ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-frontend:latest .
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-api:latest
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-frontend:latest

    - name: Deploy to Production Server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER: ${{ secrets.PRODUCTION_SERVER }}
        USER: ${{ secrets.PRODUCTION_USER }}
      run: |
        echo "$SSH_PRIVATE_KEY" > private_key
        chmod 600 private_key
        ssh -i private_key -o StrictHostKeyChecking=no $USER@$SERVER 'cd /path/to/deployment && docker-compose pull && docker-compose up -d'