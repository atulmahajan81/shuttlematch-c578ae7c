groups:
- name: api-alerts
  rules:
  - alert: HighErrorRate
    expr: rate(http_requests_total{status!~"2.."}[5m]) > 0.05
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "High error rate on API"
      description: "The API is experiencing a high error rate."

  - alert: SlowResponseTime
    expr: histogram_quantile(0.9, rate(http_request_duration_seconds_bucket[5m])) > 1
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Slow response time on API"
      description: "The API has a 90th percentile response time greater than 1 second."