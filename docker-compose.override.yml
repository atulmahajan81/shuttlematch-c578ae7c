version: '3.9'
services:
  api:
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost
    command: "npm run dev"

  db:
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust